{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mcp-rest-bridge.serviceAccountName" . }}
  labels:
    {{- include "mcp-rest-bridge.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Set at the account level too (not just the pod), so anything else scheduled
# under this account also opts out of the mounted API token by default.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
