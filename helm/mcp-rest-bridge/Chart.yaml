apiVersion: v2
name: mcp-rest-bridge
description: >-
  A minimal Helm chart for self-hosting the MCP REST Bridge gateway (Bun +
  Express + bun:sqlite backend, with a bundled Vue admin UI) on Kubernetes.
type: application
# Chart version (bump on any template/values change).
version: 0.1.0
# Tracks the app's package.json "version" — bump alongside it.
appVersion: "1.1.1"
home: https://github.com/CarlxsMG/mcpbridge
# Resolves once the repository is public; `helm lint` warns when it's absent.
icon: https://raw.githubusercontent.com/CarlxsMG/mcpbridge/main/docs/public/favicon.svg
sources:
  - https://github.com/CarlxsMG/mcpbridge
keywords:
  - mcp
  - model-context-protocol
  - api-gateway
  - llm-tools
maintainers:
  - name: CarlxsMG
    url: https://github.com/CarlxsMG
