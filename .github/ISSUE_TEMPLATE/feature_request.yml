name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For anything beyond a small change, opening this issue to discuss the approach
        **before** writing code saves everyone rework (see
        [CONTRIBUTING.md](../../CONTRIBUTING.md)).
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do, and why can't you today?
      placeholder: As an operator I want to ..., so that ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the API/UI/config shape if you can.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues/discussions and this is not a duplicate.
          required: true
