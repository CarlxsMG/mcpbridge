# GitHub Sponsors / funding links for this repository.
#
# Every entry below is intentionally commented out. GitHub only renders the
# "Sponsor" button for a platform the owner has actually enrolled in — an active
# entry pointing at an account without GitHub Sponsors enabled produces a
# validation warning on the community profile and a button that goes nowhere.
#
# To turn it on: enable GitHub Sponsors for the account first
# (https://github.com/sponsors), then uncomment the matching line.

# github: [CarlxsMG]
# ko_fi: your-handle
# buy_me_a_coffee: your-handle
# open_collective: your-project
# custom: ["https://example.com/donate"]
