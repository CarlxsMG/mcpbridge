version: 2

updates:
  # Root gateway package (Bun runtime, bun.lock — Dependabot uses the "npm"
  # ecosystem for package.json/lockfile-based JS/TS dependency updates).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    # Match the repo's enforced Conventional Commits convention (commitlint +
    # the commit-msg lefthook hook) — Dependabot's default "Bump x from y to z"
    # titles would otherwise fail the commit-message check.
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    # Collapse the weekly dev-dependency minor/patch churn into a single PR
    # instead of one per package.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Load-bearing version pins (see CLAUDE.md). Each of these breaks the build
    # or tests when bumped, so Dependabot must not keep re-opening PRs for them —
    # they move only behind a deliberate, tested upgrade, never a routine sweep.
    ignore:
      # Exact pins: ajv 8.18.0 (single-copy tree dedupe) / zod 4.3.6 (validateEnv).
      - dependency-name: "ajv"
      - dependency-name: "zod"
      # 0.28.x ships a broken .d.ts that fails our (skipLibCheck-off) typecheck;
      # hold until upstream fixes its published types.
      - dependency-name: "@scalar/openapi-parser"
      # The 7.x native-compiler rewrite is high-risk under vue-tsc / typescript-eslint;
      # take a major deliberately, not on a bot PR (minors/patches still flow).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Must match .bun-version / packageManager — bumped as part of the
      # coordinated Bun upgrade, not on its own.
      - dependency-name: "bun-types"

  # Admin UI (Vue 3 + Vite), its own package.json/lockfile.
  - package-ecosystem: "npm"
    directory: "/admin-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "admin-ui"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Same as root: the TypeScript 7.x major is high-risk under vue-tsc; take
      # it deliberately, not on a bot PR (minors/patches still flow).
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # VitePress docs/marketing site — its own package.json/lockfile (docs/bun.lock).
  # Build-time-only toolchain, but keeps its transitive vite/esbuild advisories
  # visible and auto-proposes bumps (see security.yml's docs audit note).
  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(dev-deps)"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow files themselves.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
    # One PR per week for all action bumps rather than one per action.
    groups:
      actions:
        patterns:
          - "*"

  # Dockerfile base image (oven/bun:*-alpine, digest-pinned) so base-image CVEs
  # get proposed as digest bumps.
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
