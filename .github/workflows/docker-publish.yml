# Builds the multi-stage Dockerfile at the repo root and publishes it to the
# GitHub Container Registry (GHCR) whenever a `vX.Y.Z` release tag is pushed.
# Uses the built-in GITHUB_TOKEN (no extra secrets needed) since the image is
# published under this same repo/org. The published image is multi-arch
# (amd64 + arm64), ships an SBOM + build provenance attestation, is signed with
# cosign (keyless/OIDC), and is gated by a Trivy scan BEFORE publish — a fixable
# CRITICAL/HIGH CVE fails the release, and the SARIF still lands in the Security tab.
name: Docker Publish (GHCR)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing (OIDC)
  security-events: write # upload the Trivy SARIF to the Security tab

# Tag-triggered release workflow: never cancel a run that's already publishing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    # Only ever publish from a release tag. A manual workflow_dispatch must be
    # run against a vX.Y.Z tag ref — never a feature branch, which would push a
    # branch-named image to GHCR. Mirrors release-binaries.yml's tag guard.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # GHCR requires the image name to be all-lowercase; ${{ github.repository }}
      # preserves the owner/repo's actual casing, so normalize it here.
      - name: Compute lowercase image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      # Used as metadata-action's manual-dispatch fallback tag below, and to
      # scan/report a single concrete image ref later in this job. On a
      # `push` of a `v*` tag this is the tag itself (e.g. v1.2.3); on a manual
      # workflow_dispatch run it's the ref that was run (e.g. a branch name).
      - name: Determine image tag
        id: version
        run: echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

      # Derives proper semver-component tags (:1, :1.2, :1.2.3) from the pushed
      # `vX.Y.Z` git tag, plus `:latest` via metadata-action's default
      # `flavor: latest=auto` handling for `type=semver` (applied to stable,
      # non-prerelease versions). On a manual workflow_dispatch run (no semver
      # git tag in play — `type=semver` naturally produces nothing off a
      # branch ref) the `type=raw` line below reproduces the previous
      # fallback of tagging the image with the ref that was run.
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ steps.version.outputs.tag }},enable=${{ github.event_name != 'push' }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # QEMU emulation lets a single amd64 runner build the arm64 leg too.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Build the amd64 image into the local daemon FIRST so Trivy can gate on
      # it before anything is published. The multi-arch push below reuses these
      # cached layers (cache-to gha), so the second build is fast.
      - name: Build image for scanning (amd64, local)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: linux/amd64
          tags: mcp-rest-bridge:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gate the publish: a fixable CRITICAL/HIGH CVE fails the run here, BEFORE
      # the push below. The SARIF is written before the non-zero exit, and the
      # upload step's `if: always()` still records it in the Security tab.
      - name: Scan image with Trivy (gates the publish)
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          image-ref: mcp-rest-bridge:scan
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-results.sarif

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # Keyless signature bound to this workflow's OIDC identity — verifiable with
      # `cosign verify --certificate-identity-regexp ... --certificate-oidc-issuer ...`.
      - name: Sign the published image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ steps.image.outputs.name }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Job summary
        run: |
          {
            echo "### Docker image published :whale:"
            echo
            echo "Tags pushed (linux/amd64, linux/arm64, signed, SBOM attached):"
            echo
            while IFS= read -r t; do
              [ -n "$t" ] && echo "- \`$t\`"
            done <<< "${{ steps.meta.outputs.tags }}"
            echo
            echo "\`\`\`bash"
            echo "docker pull ${{ steps.image.outputs.name }}:${{ steps.meta.outputs.version }}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
