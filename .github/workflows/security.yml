# Dependency-vulnerability gates: a PR dependency review (blocks pulling in a
# known-vulnerable or badly-licensed dep) plus a lockfile audit on push/PR and
# weekly (so a newly-disclosed CVE in an already-pinned dep still surfaces).
name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "41 4 * * 1" # Mondays 04:41 UTC

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    # Only meaningful on a PR (it diffs the PR's dependency changes).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      # No `bun install` runs in this job (`bun audit` reads the committed
      # lockfiles directly), so there's deliberately no ~/.bun/install/cache step
      # here — it would cache a directory nothing populates or consumes.
      # `bun audit` reads the committed lockfiles and reports known CVEs. Run it
      # for both the root gateway and the admin-ui (separate lockfiles). The
      # baseline currently has open moderate/low advisories in transitive deps
      # (see git history / CI logs for the full report) that shouldn't block
      # unrelated work, so the gate is scoped to high/critical severity via
      # --audit-level=high; anything at that level fails the build.
      #
      # Known, accepted moderate finding (won't surface here, but documented so
      # it isn't re-investigated from scratch): GHSA-q8mj-m7cp-5q26 (qs DoS) in
      # qs@6.15.1, nested under @stryker-mutator/core -> typed-rest-client,
      # which hard-pins "qs": "6.15.1" as an EXACT version (unlike every other
      # consumer in the tree, which already resolve to the patched qs@6.15.3) —
      # `bun update` cannot move an exact-pinned nested dep, only an upstream
      # typed-rest-client release that widens its own pin can. devDependency
      # only (bun run test:mutate), excluded from the production image by the
      # Dockerfile's `bun install --production` deps stage, so there is no
      # production exposure.
      - name: Audit root dependencies
        run: bun audit --audit-level=high
      - name: Audit admin-ui dependencies
        working-directory: admin-ui
        run: bun audit --audit-level=high
      # docs/ is a build-time-only VitePress toolchain that ships static HTML,
      # so its transitive dev-server advisories (vite/esbuild) never reach the
      # published product; the Dependabot /docs entry tracks the bumps. Gate
      # this at CRITICAL (not high) so a genuine docs-toolchain emergency still
      # fails CI, without blocking on the dev-only high/moderate advisories.
      - name: Audit docs dependencies
        working-directory: docs
        run: bun audit --audit-level=critical
