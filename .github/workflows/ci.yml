# Runs typechecking, tests, and builds for both the root gateway package and
# the admin-ui Vue app on every push and pull request.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'admin-ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Format check
        run: bun run format:check
      - name: Lint (root)
        run: bun run lint
      - name: Typecheck (root)
        run: bun run typecheck
      - name: Typecheck (tools — scripts/, e2e/)
        run: bun run typecheck:tools
      - name: Test (root)
        run: bun run test:coverage

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: bun install --frozen-lockfile
      - name: Lint (admin-ui)
        working-directory: admin-ui
        run: bun run lint
      - name: i18n parity + orphan check (admin-ui)
        working-directory: admin-ui
        run: bun run lint:i18n
      - name: Typecheck (admin-ui)
        working-directory: admin-ui
        run: bun run typecheck
      - name: Test (admin-ui)
        working-directory: admin-ui
        run: bun run test:coverage
      - name: Build (admin-ui)
        working-directory: admin-ui
        run: bun run build

  e2e:
    # Boots the real stack (admin-ui served as static files by the backend
    # at /admin, see src/index.ts) against a throwaway SQLite DB on a
    # dedicated test port, then runs the Playwright suite. The smoke test
    # alone was the only e2e gate for months; this job runs the full set
    # (12 specs: 1 smoke + 5 auth-fail-closed + 6 mcp-protocol — see
    # e2e/README in your head). The webServer in playwright.config.ts
    # builds admin-ui itself; the explicit build step here is a fast
    # no-op that pre-warms the artifact so the test step doesn't pay
    # for the build inside its own 120s timeout.
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'admin-ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: bun install --frozen-lockfile

      - name: Build admin-ui
        working-directory: admin-ui
        run: bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock') }}

      # System libraries Chromium needs are NOT stored in the browser cache, so
      # install them unconditionally; only the browser binary is cache-gated.
      - name: Install Playwright system dependencies
        run: bunx playwright install-deps chromium
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: Run E2E tests
        # WebServer in playwright.config.ts boots the backend on port 8793
        # and the fixture HTTP server on 8794 (see e2e/env.ts). ALLOW_PRIVATE_IPS
        # is set there so the loopback fixture is allowed past the SSRF guard.
        run: bun run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  docs:
    # Validates that the VitePress docs site builds on every push/PR.
    # deploy-docs.yml only runs on push to main, so without this a
    # docs-breaking change (bad config, VitePress-rejected markdown, dead
    # internal link) isn't caught until after merge, when the Pages deploy
    # fails. This is a build-only check — it never deploys.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-docs-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-docs-
      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Build docs site
        working-directory: docs
        run: bun run docs:build

  docker:
    # Validates that the container image — the primary distribution artifact,
    # consumed by both docker-compose.yml and the Helm chart — actually builds
    # on every push/PR. docker-publish.yml only builds on a `v*` tag, so
    # without this a Dockerfile / multi-stage / COPY-path break isn't caught
    # until a release is cut, after merge (the same reasoning the `docs` job
    # above applies to the Pages deploy). Build-only: single-arch, loaded
    # locally and discarded — it never pushes.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: mcp-rest-bridge:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    # Lints + renders the Helm chart on every push/PR. The multi-file chart
    # (deployment/service/secret/pvc/configmap/_helpers) is otherwise only
    # exercised by hand, so a bad template indent, undefined value, or broken
    # `define` would ship unnoticed. Helm 3 is preinstalled on ubuntu-latest, so
    # no setup action (or extra pinned dependency) is needed.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: helm lint
        run: helm lint helm/mcp-rest-bridge
      - name: helm template (render with default values)
        run: helm template mcp-rest-bridge helm/mcp-rest-bridge > /dev/null

  test-windows:
    # The Linux `test` job above is the full gate (format/lint/build included);
    # this leg re-runs typecheck + the backend and admin-ui test suites on
    # Windows to catch platform-specific regressions a Linux-only CI would miss
    # (path handling, bun:sqlite, the CRLF/LF class .gitattributes tames) — the
    # maintainer develops on Windows, and the shipped binaries include a Windows
    # target. Format/lint/build are OS-independent, so they're not repeated here.
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - name: Cache Bun install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'admin-ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install root dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck (root)
        run: bun run typecheck
      - name: Test (root)
        run: bun run test
      - name: Install admin-ui dependencies
        working-directory: admin-ui
        run: bun install --frozen-lockfile
      - name: Test (admin-ui)
        working-directory: admin-ui
        run: bun run test
