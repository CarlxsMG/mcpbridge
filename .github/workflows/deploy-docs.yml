# Builds the VitePress site in docs/ (plus the interactive admin-UI demo) and
# publishes it to GitHub Pages.
#
# One-time setup: GitHub repo → Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". Then push to main.
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "admin-ui/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      # 1. Build the public "try it" demo: the real admin UI wired to an
      #    in-browser mock backend. The base path is derived from the repo name
      #    so it resolves under https://<owner>.github.io/<repo>/demo/.
      - name: Cache admin-ui dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('admin-ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Build interactive demo
        working-directory: admin-ui
        env:
          VITE_DEMO: "true"
          DEMO_BASE: /${{ github.event.repository.name }}/demo/
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Stage demo into the site
        run: |
          rm -rf docs/public/demo
          mkdir -p docs/public/demo
          cp -r admin-ui/dist-demo/. docs/public/demo/

      # 2. Build the docs/landing site. DOCS_BASE self-corrects to the repo name.
      - name: Cache docs dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Build site
        working-directory: docs
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: bun run docs:build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
