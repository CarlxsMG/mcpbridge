# Builds the VitePress site in docs/ (plus the interactive admin-UI demo) and
# publishes it to GitHub Pages.
#
# One-time setup: GitHub repo → Settings → Pages → "Build and deployment" →
# Source = "GitHub Actions". Then push to main.
name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "admin-ui/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      # 1. Build the public "try it" demo: the real admin UI wired to an
      #    in-browser mock backend. The base path is derived from the repo name
      #    so it resolves under https://<owner>.github.io/<repo>/demo/.
      - name: Cache admin-ui dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('admin-ui/bun.lock') }}
      - name: Build interactive demo
        working-directory: admin-ui
        env:
          VITE_DEMO: "true"
          DEMO_BASE: /${{ github.event.repository.name }}/demo/
        run: |
          bun install --frozen-lockfile
          bun run build
      - name: Stage demo into the site
        run: |
          rm -rf docs/public/demo
          mkdir -p docs/public/demo
          cp -r admin-ui/dist-demo/. docs/public/demo/

      # 2. Build the docs/landing site. DOCS_BASE self-corrects to the repo name.
      - name: Cache docs dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
      - name: Install docs dependencies
        working-directory: docs
        run: bun install --frozen-lockfile
      - name: Build site
        working-directory: docs
        env:
          DOCS_BASE: /${{ github.event.repository.name }}/
        run: bun run docs:build

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
