# Cross-compiles standalone `bun build --compile` executables for a small
# target matrix and publishes them as GitHub Release assets whenever a
# `vX.Y.Z` release tag is pushed. Mirrors docker-publish.yml's trigger style
# (tag push + manual dispatch) but produces self-contained binaries instead
# of a container image — for self-hosters who'd rather skip Docker/Bun-install
# friction entirely (grab one file, run it).
#
# All targets are cross-compiled from a single ubuntu-latest runner via Bun's
# `--target=bun-<os>-<arch>` flag — Bun ships a prebuilt runtime blob for each
# supported target, so no matching-OS runner is required. See:
# https://bun.sh/docs/bundler/executables#cross-compile-to-other-platforms
#
# The binaries only contain `./src/index.ts`'s import graph. The admin UI is
# served at runtime via a filesystem read of `admin-ui/dist/`
# (`express.static(resolve(import.meta.dirname, "../admin-ui/dist"))` in
# src/server.ts) rather than an import, so `bun build --compile` never bundles
# it in. The `build-admin-ui` job below builds it separately, once, and ships
# it as a companion tarball attached to the same release — see the "Job
# summary" step for the extraction instructions self-hosters need.
name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

# Tag-triggered release workflow: never cancel a run that's already publishing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: mcp-rest-bridge-linux-x64
          - target: bun-linux-arm64
            asset: mcp-rest-bridge-linux-arm64
          - target: bun-darwin-x64
            asset: mcp-rest-bridge-darwin-x64
          - target: bun-darwin-arm64
            asset: mcp-rest-bridge-darwin-arm64
          - target: bun-windows-x64
            asset: mcp-rest-bridge-windows-x64.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install (root)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # --minify/--sourcemap shrink the binary and keep stack traces readable
      # (see "Deploying to production" in Bun's executables doc); --target
      # picks the cross-compilation target for this matrix leg.
      - name: Compile ${{ matrix.target }}
        run: |
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.target }} \
            ./src/index.ts \
            --outfile "dist/${{ matrix.asset }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # Builds the admin UI once — it's the same static bundle regardless of which
  # OS/arch binary it ends up next to, so this deliberately isn't part of the
  # `build` matrix above — and ships it as its own artifact so the `release`
  # job can attach it next to the binaries.
  build-admin-ui:
    name: Build admin UI (companion artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Cache Bun install (admin-ui)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.bun/install/cache
            admin-ui/node_modules
          key: ${{ runner.os }}-bun-admin-ui-${{ hashFiles('admin-ui/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-admin-ui-

      - name: Install admin UI dependencies
        working-directory: admin-ui
        run: bun install --frozen-lockfile

      - name: Build admin UI
        working-directory: admin-ui
        run: bun run build

      - name: Package admin-ui/dist
        run: tar -czf admin-ui-dist.tar.gz -C admin-ui/dist .

      - name: Upload admin UI artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: admin-ui-dist
          path: admin-ui-dist.tar.gz
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build, build-admin-ui]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only cut/attach-to a real GitHub Release on an actual tag push. A manual
    # workflow_dispatch run still exercises the full build matrix above (and
    # its artifacts are downloadable from the run) without publishing.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write # cosign keyless signing of the checksums file
    steps:
      # No `name:` filter, so this downloads every artifact produced by this
      # run — the per-target binaries from `build` *and* admin-ui-dist.tar.gz
      # from `build-admin-ui` — each into its own artifacts/<name>/ subdir.
      - name: Download all binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      # download-artifact@v4 lays each artifact out in its own
      # artifacts/<name>/ subdirectory — flatten so the release step gets a
      # flat list of files to attach. admin-ui-dist.tar.gz rides along
      # automatically since this just copies everything it finds.
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release

      # Covers every file in release/ — binaries and admin-ui-dist.tar.gz alike.
      - name: Generate SHA256SUMS
        working-directory: release
        run: sha256sum * > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      # Keyless signature over the checksums file. Verify the whole release with:
      #   cosign verify-blob --signature SHA256SUMS.sig --certificate SHA256SUMS.pem \
      #     --certificate-identity-regexp '.*' --certificate-oidc-issuer https://token.actions.githubusercontent.com SHA256SUMS
      #   sha256sum -c SHA256SUMS
      - name: Sign the checksums
        working-directory: release
        run: cosign sign-blob --yes --output-signature SHA256SUMS.sig --output-certificate SHA256SUMS.pem SHA256SUMS

      - name: Create/update release with binaries
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release/*
          fail_on_unmatched_files: true

      - name: Job summary
        run: |
          {
            echo "### Standalone binaries published :package:"
            echo
            echo "Tag: \`${{ github.ref_name }}\`"
            echo
            for f in release/*; do
              echo "- \`$(basename "$f")\`"
            done
            echo
            echo "**Admin console:** the binaries above are the gateway API only —"
            echo "the admin UI isn't compiled in (it's served from a filesystem path"
            echo "at runtime, not part of the JS import graph). Extract"
            echo "\`admin-ui-dist.tar.gz\` to \`./admin-ui/dist\` next to wherever you"
            echo "run the binary from, and the admin console will be served"
            echo "automatically."
          } >> "$GITHUB_STEP_SUMMARY"
