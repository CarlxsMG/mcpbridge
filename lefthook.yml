# Local git hooks — installed automatically by the `prepare` lifecycle script
# in package.json (`lefthook install`), which Bun runs on every `bun install`,
# so a fresh clone gets these hooks after its first install. Mirrors the same
# checks CI enforces (see .github/workflows/ci.yml), just earlier — catching a
# format/lint/commit-message problem before it reaches a PR instead of after.
pre-commit:
  parallel: true
  jobs:
    - name: format
      run: bun run format:check
    - name: lint (root)
      run: bun run lint
    - name: lint (admin-ui)
      root: admin-ui/
      run: bun run lint

commit-msg:
  jobs:
    - name: commitlint
      run: bunx commitlint --edit {1}
