# Minimal production compose file for the MCP REST Bridge.
#
#   # Create a .env with your REAL production secrets — do NOT `cp .env.example`,
#   # that file is the local-dev profile (NODE_ENV=development, non-Secure cookies,
#   # ALLOW_PRIVATE_IPS=true = SSRF guard off). See .env.example for the key list.
#   printf 'BOOTSTRAP_ADMIN_USERNAME=...\nBOOTSTRAP_ADMIN_PASSWORD=...\nADMIN_API_KEYS=...\n' > .env
#   docker compose up -d
#
# This file pins NODE_ENV=production (see `environment:` below), so the startup
# guards are always on: if .env carries a dev-only relaxation (SESSION_COOKIE_SECURE=false,
# an unsafe JWT config, …) the app fails closed at boot rather than running insecurely.
#
# Notes:
# - No release image is published yet, so this builds from local source
#   (`build: .` below) — `docker compose up` produces the image itself. Once the
#   first release is tagged, docker-publish.yml pushes a signed, multi-arch image
#   to GHCR; at that point comment out `build:` and this pulls `image:` instead,
#   pinned to a specific released version rather than `:latest` (a mutable tag
#   would let a `docker compose pull` silently swap the running version out from
#   under you). Bump MCPBRIDGE_VERSION (env or .env) to pick the tag once images
#   exist at https://github.com/CarlxsMG/mcpbridge/pkgs/container/mcpbridge.
# - `env_file` injects .env into the container's process env (same file
#   Compose also reads for ${VAR} substitution below, so PORT stays in sync
#   on both sides of the port mapping).
# - The image already declares a HEALTHCHECK (wget .../livez) in the
#   Dockerfile — Compose picks that up automatically, no need to redeclare
#   it here. That healthcheck runs *inside* the container and always probes
#   the container's own `$PORT` env var (`http://localhost:$PORT/livez`),
#   never the host-side port mapping above — so the mapping alone overriding
#   PORT is not enough. `env_file: .env` is what makes an overridden PORT
#   actually reach the container's process env, which is what keeps the
#   healthcheck (and the app itself) pointed at the right port.
# - The SQLite DB (DB_PATH=/app/data/mcp-bridge.db, set in the Dockerfile)
#   lives on the named volume below so it survives container recreation.
# - Runtime hardening mirrors the Helm chart's securityContext: no privilege
#   escalation, and a read-only root filesystem with an explicit tmpfs for
#   the few paths Bun/the app need to write to at runtime (nothing under
#   /app itself — /app/data is already its own writable named volume above).

services:
  mcp-bridge:
    image: ghcr.io/carlxsmg/mcpbridge:${MCPBRIDGE_VERSION:-1.0.0}
    build: . # builds from local source (no release image is published yet); comment this out to pull the signed GHCR image once the first release is tagged
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    env_file:
      - .env
    environment:
      # Force the production posture regardless of what .env carries — `environment`
      # wins over `env_file`, so a stray NODE_ENV=development (e.g. from copying the
      # dev example) can't disable checkStartupGuards on the prod compose path.
      NODE_ENV: production
    volumes:
      - mcp-bridge-data:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m

volumes:
  mcp-bridge-data:
